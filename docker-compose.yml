version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: fleetpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "5000:5000"   # TCP
      - "3000:3000"   # HTTP + WebSocket
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  pgdata:
